<div [appHighlight]="'#F4F7FF'" style="background: white; border: 1px solid #E4E8EF; border-radius: 10px; padding: 16px; display: flex; flex-direction: column; gap: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); cursor: pointer;">
  <div style="display: flex; justify-content: space-between; align-items: flex-start;">
    <h3 style="margin: 0; font-size: 15px; font-weight: 600; color: #0D1117;">{{ course.name }}</h3>
    <span style="font-family: monospace; font-size: 11px; background: #F0F2F5; padding: 2px 6px; border-radius: 4px; color: #7A8499;">{{ course.code }}</span>
  </div>
  
  <p style="margin: 0; font-size: 13px; color: #7A8499;">
    Academic Metric: <strong>{{ course.credits | courseDuration }}</strong>
  </p>
  
  <button (click)="onEnroll()" style="margin-top: 8px; width: 100%; height: 32px; background: #0D1117; color: white; border: none; border-radius: 6px; font-weight: 600; font-size: 12px; cursor: pointer;">
    Enroll Track
  </button>
</div>
