<div style="padding: 24px; font-family: sans-serif; max-width: 800px; margin: 0 auto; border-top: 1px solid #E4E8EF;">
  <h2 style="font-size: 18px; font-weight: 600; color: #0D1117; margin-bottom: 16px;">Available Course Modules</h2>
  
  <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 20px;">
    @for (item of courses; track item.id) {
      <app-course-card [course]="item" (enrollRequested)="onEnroll($event)"></app-course-card>
    }
  </div>

  @if (selectedCourseId) {
    <div style="background: #ECFDF3; color: #16A34A; padding: 12px 16px; border-radius: 8px; border: 1px solid #BBF7D0; font-size: 13px; font-weight: 500;">
      🎯 Selected course tracking confirmation payload ID: <strong>{{ selectedCourseId }}</strong>
    </div>
  }
</div>
